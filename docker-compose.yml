version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: bat_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-batpro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-batpro_secret}
      POSTGRES_DB: ${POSTGRES_DB:-batpro_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - batpro_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-batpro}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bat_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - batpro_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bat_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-batpro}:${POSTGRES_PASSWORD:-batpro_secret}@postgres:5432/${POSTGRES_DB:-batpro_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
    volumes:
      - ./logs:/app/logs
      - ./backups:/app/backups
    ports:
      - "8000:8000"
    networks:
      - batpro_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4"

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bat_celery_worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-batpro}:${POSTGRES_PASSWORD:-batpro_secret}@postgres:5432/${POSTGRES_DB:-batpro_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
    volumes:
      - ./logs:/app/logs
    networks:
      - batpro_net
    depends_on:
      - backend
      - redis
    command: celery -A core.celery_app worker --loglevel=info --concurrency=4 -Q signals,trades,notifications

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bat_celery_beat
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-batpro}:${POSTGRES_PASSWORD:-batpro_secret}@postgres:5432/${POSTGRES_DB:-batpro_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
    volumes:
      - ./logs:/app/logs
    networks:
      - batpro_net
    depends_on:
      - celery_worker
    command: celery -A core.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bat_frontend
    restart: unless-stopped
    networks:
      - batpro_net

  nginx:
    image: nginx:alpine
    container_name: bat_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - batpro_net
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:

networks:
  batpro_net:
    driver: bridge
